<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>8码快传演示</title>
    <link rel="stylesheet" href="./demo.css">
  </head>
  <body>
    <main class="stage">
      <header class="brand"><img src="../../assets/logo.svg" alt=""><strong>8码快传</strong><span>免费 · 无需登录</span></header>

      <section class="scene scene--opening">
        <p>方便、安全、快速地传文件</p>
        <h1>文件，不必先上传。</h1>
        <span>电脑和手机，打开浏览器就能用</span>
      </section>

      <section class="scene scene--home">
        <div class="caption"><span>01</span><strong>选择文件</strong><p>无需注册，也不用安装应用</p></div>
        <figure><img src="../../assets/screenshots/product-home-zh.png" alt=""></figure>
      </section>

      <section class="scene scene--share">
        <div class="caption"><span>02</span><strong>分享一种接收方式</strong><p>链接、二维码或 8 位提取码</p></div>
        <figure><img src="../../assets/screenshots/product-share-zh.png" alt=""></figure>
      </section>

      <section class="scene scene--finish">
        <div class="wifi">同一 WiFi，双方打开网站即可互传</div>
        <h2>充分利用当前网络的可用带宽</h2>
        <p>免费使用 · 无需注册登录 · 桌面 Chrome / Edge 单文件最高 100 GB</p>
        <strong class="url">t.8ma.co</strong>
      </section>

      <span class="watermark">Created by Huashu-Design</span>
    </main>
  </body>
</html>
